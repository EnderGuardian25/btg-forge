<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BTG Forge — Pipeline Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #30363d;
    --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
    --pass: #3fb950; --concerns: #d29922; --fail: #f85149; --none: #6e7681;
    --demo: #a371f7;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f8fa; --panel: #fff; --panel2: #f0f3f6; --border: #d0d7de;
      --fg: #1f2328; --dim: #656d76; --accent: #0969da;
      --pass: #1a7f37; --concerns: #9a6700; --fail: #cf222e; --none: #8c959f;
      --demo: #8250df;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
  header .sub { color: var(--dim); font-size: 13px; }
  header .stamp { margin-left: auto; color: var(--dim); font-size: 12px; }
  main { padding: 24px 28px; max-width: 1100px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; margin-bottom: 28px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat .n { font-size: 26px; font-weight: 700; }
  .stat .l { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .stat.pass .n { color: var(--pass); } .stat.concerns .n { color: var(--concerns); } .stat.fail .n { color: var(--fail); }
  .feature {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 18px;
  }
  .feature h2 { margin: 0 0 4px; font-size: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: .3px; }
  .tag.demo { background: color-mix(in srgb, var(--demo) 20%, transparent); color: var(--demo); border: 1px solid var(--demo); }
  .tag.archived { background: color-mix(in srgb, var(--none) 25%, transparent); color: var(--dim); border: 1px solid var(--none); }
  .tag.tier { border: 1px solid var(--border); color: var(--dim); }
  .path { color: var(--dim); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .stages { display: flex; gap: 4px; flex-wrap: wrap; margin: 14px 0; }
  .stg { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: var(--panel2); color: var(--dim); border: 1px solid var(--border); }
  .stg.done { color: var(--fg); }
  .stg.current { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .gates { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .gate { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 54px; }
  .gate .dot { width: 100%; text-align: center; font-size: 11px; font-weight: 700; padding: 5px 6px; border-radius: 6px; }
  .gate .gn { font-size: 10px; color: var(--dim); }
  .v-PASS { background: color-mix(in srgb, var(--pass) 20%, transparent); color: var(--pass); }
  .v-CONCERNS { background: color-mix(in srgb, var(--concerns) 22%, transparent); color: var(--concerns); }
  .v-FAIL { background: color-mix(in srgb, var(--fail) 22%, transparent); color: var(--fail); }
  .v-none { background: var(--panel2); color: var(--none); }
  .next { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; display: inline-block; margin-top: 6px; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--accent); font-size: 13px; }
  table { border-collapse: collapse; width: 100%; margin-top: 10px; font-size: 13px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .yes { color: var(--pass); } .no { color: var(--fail); } .na { color: var(--none); }
  .clar { color: var(--concerns); font-size: 12px; margin-top: 8px; }
  .empty { color: var(--dim); text-align: center; padding: 40px; }
  footer { color: var(--dim); font-size: 12px; text-align: center; padding: 20px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🔨 BTG Forge</h1>
  <span class="sub">gate-driven pipeline dashboard</span>
  <span class="stamp" id="stamp"></span>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div id="features"></div>
</main>
<footer>Auto-generated from <code>.forge/</code> state on every push to <code>main</code>. · <span id="fcount"></span></footer>

<script>
const VLABEL = { PASS: "PASS", CONCERNS: "CONC", FAIL: "FAIL" };

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

function stat(n, label, cls) {
  const d = el("div", "stat" + (cls ? " " + cls : ""));
  d.append(el("div", "n", String(n)), el("div", "l", label));
  return d;
}

function renderStats(s) {
  const c = document.getElementById("stats");
  c.append(
    stat(s.features, "in flight"),
    stat(s.gatesPassed, "gates passed", "pass"),
    stat(s.gatesConcerns, "concerns", "concerns"),
    stat(s.gatesFailed, "gates failed", "fail"),
    stat(s.openClarifications, "open clarifications"),
    stat(s.archived, "archived"),
  );
}

function gateMap(feat) {
  const m = {};
  for (const g of feat.gates) m[g.id] = g;
  return m;
}

function renderFeature(f, gateOrder, stageOrder) {
  const card = el("div", "feature");
  const h = el("h2");
  h.append(document.createTextNode(f.slug));
  if (f.isDemo) h.append(el("span", "tag demo", "DEMO"));
  if (f.archived) h.append(el("span", "tag archived", "ARCHIVED"));
  if (f.plan && f.plan.tier) h.append(el("span", "tag tier", f.plan.tier + (f.plan.score != null ? " " + f.plan.score + "/10" : "")));
  card.append(h);
  card.append(el("div", "path", f.path));

  // stage rail
  const stages = el("div", "stages");
  const curIdx = stageOrder.indexOf(f.stage);
  stageOrder.forEach((s, i) => {
    let cls = "stg";
    if (f.stage === "archived") cls += " done";
    else if (i < curIdx) cls += " done";
    else if (i === curIdx) cls += " current";
    stages.append(el("span", cls, s));
  });
  card.append(stages);

  // gate row
  const gm = gateMap(f);
  const gates = el("div", "gates");
  gateOrder.forEach((id) => {
    const g = gm[id];
    const wrap = el("div", "gate");
    const v = g ? g.verdict : "none";
    const dot = el("div", "dot v-" + v, g ? (VLABEL[v] || v) + (g.justified ? "*" : "") : "·");
    if (g) dot.title = g.reasons.join("\n");
    wrap.append(dot, el("div", "gn", id));
    gates.append(wrap);
  });
  card.append(gates);

  if (f.spec.needsClarification > 0)
    card.append(el("div", "clar", "⚠ " + f.spec.needsClarification + " open [NEEDS CLARIFICATION] marker(s)"));

  card.append(el("div", "next", "next → " + f.next));

  // traceability
  if (f.trace.length) {
    const det = el("details");
    det.append(el("summary", null, "Traceability matrix (" + f.trace.length + " requirement(s))"));
    const t = el("table");
    t.innerHTML = "<thead><tr><th>Req</th><th>Title</th><th>Section</th><th>In tasks</th><th>Verified</th></tr></thead>";
    const tb = el("tbody");
    for (const r of f.trace) {
      const tr = el("tr");
      const mark = (v) => v === null ? '<span class="na">—</span>' : v ? '<span class="yes">✓</span>' : '<span class="no">✗</span>';
      tr.innerHTML = `<td>${r.req}</td><td>${r.title}</td><td>${r.section}</td><td>${mark(r.inTasks)}</td><td>${mark(r.verified)}</td>`;
      tb.append(tr);
    }
    t.append(tb);
    det.append(t);
    card.append(det);
  }
  return card;
}

fetch("data.json?" + Date.now())
  .then((r) => r.json())
  .then((data) => {
    renderStats(data.stats);
    const fc = document.getElementById("features");
    if (!data.features.length) {
      fc.append(el("div", "empty", "No features yet. Run <code>/forge:specify</code> to start one."));
    } else {
      for (const f of data.features) fc.append(renderFeature(f, data.gateOrder, data.stageOrder));
    }
    document.getElementById("fcount").textContent = data.features.length + " feature(s) tracked";
    if (data.generatedAt) document.getElementById("stamp").textContent = "built " + data.generatedAt;
  })
  .catch((e) => {
    document.getElementById("features").append(el("div", "empty", "Failed to load data.json — " + e.message));
  });
</script>
</body>
</html>
